<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Reels | Premium News Feed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050505;
            --bg-secondary: #0f0f10;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --card-bg: #121214;
            --border: #27272a;
            --glass: rgba(18, 18, 20, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 5rem;
        }

        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
        }

        header {
            padding: 3rem 2rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
            backdrop-filter: blur(8px);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 500;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 4rem;
            background: var(--glass);
            padding: 0.5rem;
            border-radius: 100px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .filter-btn {
            padding: 0.6rem 1.8rem;
            border-radius: 100px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .filter-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-btn.active {
            background: var(--text-primary);
            color: var(--bg-primary);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 2.5rem;
        }

        .news-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .news-card:hover {
            transform: translateY(-8px);
            border-color: #3f3f46;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            /* 16:9 Aspect Ratio */
            overflow: hidden;
        }

        .card-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .news-card:hover .card-image {
            transform: scale(1.08);
        }

        .category-label {
            position: absolute;
            top: 1.25rem;
            left: 1.25rem;
            padding: 0.4rem 0.9rem;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-body {
            padding: 1.75rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 500;
        }

        .meta-dot {
            width: 3px;
            height: 3px;
            background: var(--text-secondary);
            border-radius: 50%;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 1rem;
            color: #efeff1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-link {
            margin-top: auto;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: gap 0.3s ease;
        }

        .card-link:hover {
            gap: 0.8rem;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 5rem;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--text-secondary);
            background: #1c1c1f;
        }

        .page-btn.active {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 0 1rem;
        }

        #loader {
            display: flex;
            justify-content: center;
            padding: 6rem;
        }

        .shimmer {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: #fff;
            border-radius: 50%;
            animation: rotate 0.8s infinite linear;
        }

        @keyframes rotate {
            to {
                transform: rotate(360deg);
            }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--bg-secondary);
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 32px;
            border: 1px solid var(--border);
            overflow-y: auto;
            position: relative;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            color: #fff;
            transition: background 0.3s;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Slider */
        .slider-container {
            width: 100%;
            height: 450px;
            position: relative;
            background: #000;
        }

        .slide {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .slide.active {
            display: block;
        }

        .slider-nav {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            backdrop-filter: blur(5px);
        }

        .slider-dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-dot.active {
            background: #fff;
            width: 20px;
            border-radius: 4px;
        }

        .modal-body {
            padding: 3rem;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        .modal-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2.25rem;
            }

            main {
                padding: 0 1rem;
            }

            .nav-bar {
                width: 100%;
                overflow-x: auto;
                border-radius: 0;
                padding: 0.5rem 1rem;
                justify-content: flex-start;
            }

            .filter-btn {
                padding: 0.5rem 1.25rem;
                flex-shrink: 0;
            }

            .slider-container {
                height: 250px;
            }

            .modal-body {
                padding: 1.5rem;
            }

            .modal-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <header>
        <h1>News Reel</h1>
        <div class="subtitle">Global Intelligence Platform</div>
    </header>

    <main>
        <div class="nav-bar">
            <button class="filter-btn active" onclick="setCategory('all')">Latest</button>
            <button class="filter-btn" onclick="setCategory('trending')">Trending</button>
            <button class="filter-btn" onclick="setCategory('national')">National</button>
            <button class="filter-btn" onclick="setCategory('international')">International</button>
            <button class="filter-btn" onclick="setCategory('lifestyle')">Lifestyle</button>
        </div>

        <div id="loader">
            <div class="shimmer"></div>
        </div>

        <div id="newsGrid" class="news-grid"></div>

        <div class="pagination" id="pagination">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">←</button>
            <span class="page-info" id="pageInfo">Page 1 of 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">→</button>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="close-modal" onclick="closeModal()">✕</div>
            <div id="modalSlider" class="slider-container"></div>
            <div class="modal-body">
                <div id="modalMeta" class="meta" style="margin-bottom: 0.5rem;"></div>
                <h2 id="modalTitle" class="modal-title"></h2>
                <div id="modalDesc" class="modal-desc"></div>
            </div>
        </div>
    </div>

    <script>
        let page = 1;
        let limit = 500;
        let category = 'all';
        let totalPages = 1;
        let newsData = [];

        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            const loader = document.getElementById('loader');
            const pagin = document.getElementById('pagination');

            loader.style.display = 'flex';
            grid.style.opacity = '0.3';
            pagin.style.opacity = '0.3';

            try {
                const url = `/news?page=${page}&limit=${limit}${category !== 'all' ? `&category=${category}` : ''}`;
                const response = await fetch(url);
                const result = await response.json();

                newsData = result.data;
                totalPages = result.pagination.totalPages;
                updatePagination();

                grid.innerHTML = '';
                newsData.forEach((item, index) => {
                    const date = new Date(item.createdAt).toLocaleDateString('en-US', {
                        month: 'short', day: 'numeric', year: 'numeric'
                    });

                    const images = item.imageLinks && item.imageLinks.length > 0 ? item.imageLinks : [item.imageLink];
                    const sliderHtml = images.map((img, i) => `
                        <img src="${img || 'https://via.placeholder.com/800x450?text=No+Image+Available'}" 
                             class="card-image ${i === 0 ? 'active' : ''}" 
                             style="display: ${i === 0 ? 'block' : 'none'}; position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;"
                             onerror="this.src='https://via.placeholder.com/800x450?text=No+Image+Available'">
                    `).join('');

                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.innerHTML = `
                        <div class="image-wrapper card-slider" style="position: relative; height: 200px; overflow: hidden;">
                            ${sliderHtml}
                            <div class="category-label">${item.category}</div>
                        </div>
                        <div class="card-body">
                            <div class="meta">
                                <span>${date}</span>
                                <div class="meta-dot"></div>
                                <span>${item.sourceName || 'Auto Scraped'}</span>
                            </div>
                            <h3 class="card-title">${item.title}</h3>
                            <p class="card-text">${item.description}</p>
                            <a href="javascript:void(0)" class="card-link" onclick="openModal(${index})">Read Full Story →</a>
                        </div>
                    `;

                    grid.appendChild(card);
                });

                // Start Auto-Play for Cards
                startCardSliders();

                loader.style.display = 'none';
                grid.style.opacity = '1';
                pagin.style.opacity = '1';
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                console.error('Fetch error:', error);
                loader.style.display = 'none';
            }
        }

        let cardSliderInterval;
        function startCardSliders() {
            if (cardSliderInterval) clearInterval(cardSliderInterval);
            cardSliderInterval = setInterval(() => {
                document.querySelectorAll('.card-slider').forEach(slider => {
                    const images = slider.querySelectorAll('.card-image');
                    if (images.length <= 1) return;

                    let activeImg = slider.querySelector('.card-image.active');
                    let nextImg = activeImg.nextElementSibling;

                    if (!nextImg || !nextImg.classList.contains('card-image')) {
                        nextImg = images[0];
                    }

                    activeImg.classList.remove('active');
                    activeImg.style.display = 'none';
                    nextImg.classList.add('active');
                    nextImg.style.display = 'block';
                });
            }, 3000);
        }



        let autoSlideInterval;
        let currentSlideIndex = 0;
        let totalSlides = 0;

        function openModal(index) {
            const item = newsData[index];
            const overlay = document.getElementById('modalOverlay');
            const slider = document.getElementById('modalSlider');

            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('modalDesc').innerText = item.description;

            const date = new Date(item.createdAt).toLocaleDateString('en-US', {
                month: 'long', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });
            document.getElementById('modalMeta').innerHTML = `<span>${date}</span><div class="meta-dot"></div><span>${item.sourceName}</span>`;

            // Build Slider
            slider.innerHTML = '';
            const images = item.imageLinks && item.imageLinks.length > 0 ? item.imageLinks.filter(img => img && img.length > 0) : [];
            totalSlides = images.length;
            currentSlideIndex = 0;

            if (totalSlides === 0) {
                slider.style.display = 'none';
            } else {
                slider.style.display = 'block';
                images.forEach((img, i) => {
                    const slide = document.createElement('img');
                    slide.src = img;
                    slide.className = `slide ${i === 0 ? 'active' : ''}`;
                    slide.style.display = i === 0 ? 'block' : 'none';
                    slider.appendChild(slide);
                });

                if (totalSlides > 1) {
                    const nav = document.createElement('div');
                    nav.className = 'slider-nav';
                    images.forEach((_, i) => {
                        const dot = document.createElement('div');
                        dot.className = `slider-dot ${i === 0 ? 'active' : ''}`;
                        dot.onclick = (e) => {
                            e.stopPropagation();
                            showSlide(i);
                            resetAutoSlide();
                        };
                        nav.appendChild(dot);
                    });
                    slider.appendChild(nav);
                    startAutoSlide();
                }
            }

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.slider-dot');
            if (slides.length === 0) return;

            currentSlideIndex = index;
            slides.forEach((s, i) => {
                s.classList.toggle('active', i === index);
                s.style.display = i === index ? 'block' : 'none';
            });
            dots.forEach((d, i) => d.classList.toggle('active', i === index));
        }

        function startAutoSlide() {
            stopAutoSlide();
            autoSlideInterval = setInterval(() => {
                let next = (currentSlideIndex + 1) % totalSlides;
                showSlide(next);
            }, 3000);
        }

        function stopAutoSlide() {
            if (autoSlideInterval) clearInterval(autoSlideInterval);
        }

        function resetAutoSlide() {
            startAutoSlide();
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('active');
            document.body.style.overflow = 'auto';
            stopAutoSlide();
        }


        function setCategory(cat) {
            category = cat;
            page = 1;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === cat || (cat === 'all' && btn.innerText === 'Latest'));
            });

            fetchNews();
        }

        function changePage(delta) {
            const newPage = page + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                page = newPage;
                fetchNews();
            }
        }

        function updatePagination() {
            document.getElementById('prevBtn').disabled = page === 1;
            document.getElementById('nextBtn').disabled = page === totalPages;
            document.getElementById('pageInfo').innerText = `Page ${page} of ${totalPages}`;
        }

        fetchNews();
    </script>
</body>

</html>
